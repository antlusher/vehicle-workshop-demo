version: '3.9'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: vehicle-workshop-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-workshop}
      POSTGRES_USER: ${POSTGRES_USER:-workshop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-workshop}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-workshop} -d ${POSTGRES_DB:-workshop}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: vehicle-workshop-backend
    ports:
      - "4000:4000"
    env_file:
      - ./server/.env
    environment:
      - CLIENT_ORIGIN=${CLIENT_ORIGIN:-http://localhost:5173}
      - DATABASE_URL=${DATABASE_URL:-postgresql://workshop:workshop@db:5432/workshop}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./server/data:/usr/src/app/server/data
      - uploads:/usr/src/app/server/uploads

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: vehicle-workshop-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  adminer:
    image: adminer:latest
    container_name: vehicle-workshop-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
