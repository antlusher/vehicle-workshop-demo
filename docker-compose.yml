version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: vehicle-workshop-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-workshop}
      POSTGRES_USER: ${POSTGRES_USER:-workshop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-workshop}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: vehicle-workshop-backend
    ports:
      - "4000:4000"
    env_file:
      - ./server/.env
    environment:
      - CLIENT_ORIGIN=${CLIENT_ORIGIN:-http://localhost:5173}
      - DATABASE_URL=${DATABASE_URL:-postgresql://workshop:workshop@db:5432/workshop}
    depends_on:
      - db
    volumes:
      - ./server/data:/usr/src/app/server/data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000}
    container_name: vehicle-workshop-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
