version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: vehicle-workshop-backend
    ports:
      - "4000:4000"
    env_file:
      - ./server/.env
    volumes:
      - ./server/data:/usr/src/app/server/data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000}
    container_name: vehicle-workshop-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
